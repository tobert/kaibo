# Build single-file kaibo binaries for every supported target and attach them to a
# GitHub release. Triggered by pushing a `v*` tag (e.g. `v0.1.0`); also runnable by
# hand (workflow_dispatch) to smoke-test the matrix without cutting a release.
#
# TLS is rustls + the ring crypto provider (see Cargo.toml / src/tls.rs), so there is
# NO aws-lc-sys / OpenSSL C dependency — that is what lets the musl targets link
# fully static with nothing but a Rust toolchain plus zig (for ring's small C/asm).
# cargo-zigbuild uses `zig cc` as the cross C compiler/linker, which keeps the Linux
# cross-builds painless and lets one Linux runner emit both arches.
#
# Actions are pinned by commit SHA, not tag — a tag can be moved, a digest can't
# (supply-chain). Each pin carries a `# vX.Y.Z` comment naming the release it points
# at, for humans and Dependabot.
#
# Releases are born signed: the publish job cosign-signs an aggregated
# checksums.txt (keyless — the identity IS this workflow at this tag), attaches
# SLSA build provenance per artifact (`gh attestation verify`), and ships an SPDX
# SBOM from Cargo.lock. Verification commands live in the README.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: fully static via musl. zigbuild handles the cross C toolchain.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          # arm64 hardware (not cross-compiled from x86_64) so the smoke step below
          # can execute this leg's binary natively, not just link it.
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          # macOS: not "static" (Apple forbids static libSystem) but self-contained
          # — depends only on always-present system libs. Native build per arch.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Windows: static CRT (+crt-static, set in .cargo/config.toml) → one .exe,
          # no VCRedist. rustls/ring means no OpenSSL DLL to ship either.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable branch, pinned 2026-07-05
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      # cargo-zigbuild + zig only for the musl cross-builds; native targets use plain
      # cargo (no zig needed) so we don't pay for it on macOS/Windows.
      - name: Install zig
        if: endsWith(matrix.target, '-linux-musl')
        run: python3 -m pip install ziglang

      # Prebuilt binary, not `cargo install` from source — that compiled from scratch
      # on every run and made the arm64 leg's cold start painfully slow.
      - name: Install cargo-zigbuild
        if: endsWith(matrix.target, '-linux-musl')
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-zigbuild

      - name: Build (musl, static)
        if: endsWith(matrix.target, '-linux-musl')
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !endsWith(matrix.target, '-linux-musl') }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Linking isn't running: a binary can link cleanly and still crash at startup,
      # so every leg executes its own binary here. The aarch64 leg runs natively on
      # ubuntu-24.04-arm; x86_64-apple-darwin runs under Rosetta 2 on the arm64
      # macos-latest runner — expected, don't "fix" that leg back to an Intel runner.
      - name: Smoke (run the binary)
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/kaibo"
          [ -f "$bin" ] || bin="$bin.exe"
          "$bin" --version

      # musl legs only: ldd exits non-zero on a fully static binary, so that's the
      # success case here — hence `|| true` plus a grep instead of a plain run.
      - name: Smoke (assert fully static)
        if: endsWith(matrix.target, '-linux-musl')
        shell: bash
        run: |
          out=$(ldd "target/${{ matrix.target }}/release/kaibo" 2>&1 || true)
          echo "$out"
          grep -q "not a dynamic executable" <<<"$out"

      # Package: tar.gz on Unix, zip on Windows. Name carries version + target so a
      # release page lists one obvious artifact per platform.
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          bin="target/${{ matrix.target }}/release/kaibo"
          dist="kaibo-${GITHUB_REF_NAME//\//-}-${{ matrix.target }}" # slashes in a branch ref break mkdir/tar
          mkdir "$dist"
          cp "$bin" README.md LICENSE "$dist"/ 2>/dev/null || cp "$bin" "$dist"/
          # macOS's bundled tar is bsdtar, which lacks --sort/--mtime; GitHub's macOS
          # runners also ship GNU tar as `gtar`, so prefer that for a byte-stable archive.
          tar=$(command -v gtar || command -v tar)
          "$tar" --sort=name --owner=0 --group=0 --numeric-owner --mtime="@$SOURCE_DATE_EPOCH" -cf - "$dist" | gzip -n > "$dist.tar.gz"
          sha256sum "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          bin="target/${{ matrix.target }}/release/kaibo.exe"
          dist="kaibo-${GITHUB_REF_NAME//\//-}-${{ matrix.target }}" # slashes in a branch ref break mkdir/tar
          mkdir "$dist"
          cp "$bin" "$dist"/
          # Fix mtimes before zipping so the archive is byte-stable for this commit —
          # including the directory itself (7z stores the dir entry's mtime too).
          # Entry ORDER is the other determinism axis: 7z enumerates the filesystem
          # (no --sort=name equivalent), which is only guaranteed stable here because
          # the archive holds a single file. If this zip ever gains more files, feed
          # 7z an explicitly sorted list.
          touch -d "@$SOURCE_DATE_EPOCH" "$dist" "$dist"/*
          7z a "$dist.zip" "$dist" >/dev/null
          sha256sum "$dist.zip" > "$dist.zip.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kaibo-${{ matrix.target }}
          path: |
            kaibo-*.tar.gz*
            kaibo-*.zip*

  # Signing, provenance, and the SBOM all live here in the tag-gated publish job —
  # a `workflow_dispatch` smoke run never mints an OIDC identity or a signature.
  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
      id-token: write # mint the OIDC identity cosign + provenance sign with
      attestations: write # store the build-provenance attestations
    steps:
      # Checkout is here only for Cargo.lock: the SBOM catalogs the locked
      # dependency tree, which covers every target (the lockfile is a superset
      # including each platform's conditional deps). The binaries themselves
      # carry no dependency metadata for syft to read — that would take
      # cargo-auditable, tracked as a follow-up in docs/issues.md.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: SBOM (syft over Cargo.lock)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: Cargo.lock
          format: spdx-json
          output-file: dist/kaibo-${{ github.ref_name }}-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      # One aggregated manifest so the signature below covers every artifact
      # transitively: verify checksums.txt once, then `sha256sum -c` whichever
      # file you downloaded. The per-artifact .sha256 sidecars stay — the
      # README's download one-liner uses them.
      - name: Aggregate checksums
        working-directory: dist
        run: sha256sum kaibo-*.tar.gz kaibo-*.zip kaibo-*-sbom.spdx.json > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless: the signature binds to this workflow run's OIDC identity (repo,
      # workflow path, tag ref) via a short-lived Fulcio certificate, recorded in
      # the Rekor transparency log — no long-lived key anywhere. Verification
      # REQUIRES the identity flags (a bare verify-blob cannot work for keyless);
      # the exact invocation lives in the README's "Verify a download" section.
      # One signature shape: the .sigstore.json protobuf bundle, self-contained
      # (cert + signature + Rekor entry), so `verify-blob --bundle` works offline.
      # cosign v3 IGNORES the legacy --output-signature/--output-certificate pair
      # in bundle mode (v0.2.0-rc.2 proved it: warned, wrote nothing) — an operator
      # without cosign verifies through `gh attestation verify` instead.
      - name: Sign checksums.txt (cosign keyless)
        working-directory: dist
        run: cosign sign-blob --yes --bundle checksums.txt.sigstore.json checksums.txt

      # SLSA build provenance per artifact, stored in GitHub's attestation store
      # (adds no release assets): `gh attestation verify <file> -R tobert/kaibo`
      # is the one-command per-file verification path.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/kaibo-*.tar.gz
            dist/kaibo-*.zip
            dist/kaibo-*-sbom.spdx.json
            dist/checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
          # A semver prerelease tag (v0.2.0-rc.1) is a GitHub prerelease — the
          # Releases page must not present an rc as the latest stable.
          prerelease: ${{ contains(github.ref_name, '-') }}
