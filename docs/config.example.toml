# kaibo (解剖) — example configuration.
#
# Copy to $XDG_CONFIG_HOME/kaibo/config.toml (default ~/.config/kaibo/config.toml),
# or point at it with --config <path> / KAIBO_CONFIG.
#
# EVERYTHING here is optional. With no config file at all, kaibo runs exactly as it
# does today: five built-in BACKENDS (connections: anthropic/deepseek/gemini/openrouter/
# openai-local) and seven built-in CASTS (compositions: role → "backend/model-id") —
# five same-named interactive ones plus two batch casts (anthropic-batch, gemini-batch)
# — ship in code; this file only OVERRIDES fields or ADDS backends and casts.
# `[profiles]` is gone — a config that still carries it is a load error pointing at
# docs/casts.md.
#
# Precedence, highest wins:
#   MCP per-call input  >  CLI flag  >  env var (KAIBO_*)  >  this file  >  built-in
#
# Naming rule:  config key `foo_bar`  ⇄  env `KAIBO_FOO_BAR`  ⇄  CLI `--foo-bar`
# Exceptions (kept native, on purpose): the provider key env vars
# (ANTHROPIC_API_KEY, DEEPSEEK_API_KEY, GEMINI_API_KEY, OPENROUTER_API_KEY,
# OPENAI_API_KEY) and OPENAI_BASE_URL. RUST_LOG is also kept as-is.

# ---------------------------------------------------------------------------
# Getting started — a fresh install has no key yet
# ---------------------------------------------------------------------------
# With nothing configured, kaibo starts fine and `run_kaish` works immediately —
# the read-only shell needs no model. `consult` / `oneshot` need a
# provider key on the default cast (`anthropic` out of the box). Give it one the
# private way — kaibo reads the key at startup, so it never enters your chat:
#   env:   export ANTHROPIC_API_KEY=sk-...     (or DEEPSEEK_/GEMINI_/OPENROUTER_/OPENAI_…)
#   file:  printf %s 'sk-...' > ~/.anthropic-key.txt   (env wins over file)
# Don't paste the key to the model — set the env var or key file in your shell.
# Then RECONNECT the kaibo MCP server so it re-reads the environment and this file
# (keys are read once at startup; in Claude Code: run /mcp and reconnect kaibo).
# Prefer another provider? Pass cast="<backend-or-cast>" per call, or set
# `cast` below.
#
# kaibo serves two resources you can read from your MCP client, no tool turn spent:
#   kaibo://config          the *resolved* runtime state (key sources, never values)
#   kaibo://config/example  this annotated template, embedded in the binary

# ---------------------------------------------------------------------------
# [server] — process-level defaults (the things --root / --cast / --no-* set)
# ---------------------------------------------------------------------------
[server]
# Default project root when a call omits `path`. Omit to require `path` per call.
# root = "/home/atobey/src/kaibo"

# Additional allowed path trees beyond root. A per-call `path` must resolve to
# at-or-under root OR one of these trees. With neither set, the server defaults
# to the launch cwd. Also settable via --allow-path (CLI) or KAIBO_ALLOW_PATHS
# (colon-separated env var); a non-empty CLI list replaces the env/file layer.
# allow_paths = ["/home/atobey/shared-libs", "/data/shared"]

# Follow git worktrees of an already-allowed repo (default true). When a call's
# `path` misses the allowed set, kaibo admits it if it is a linked worktree of a
# repo already in the set — so a sibling branch checkout (even one created
# mid-session) is reachable without an --allow-path. Resolved by reading git's
# link files, never by running git. The kaibo://config [runtime] section lists the
# worktrees currently followed. Set false to keep the boundary strictly static
# (also: --no-follow-worktrees, KAIBO_NO_FOLLOW_WORKTREES).
# follow_worktrees = true

# Default cast (by name or alias) when a call omits `cast`. The old `provider`
# key is a load error (unknown field) — see docs/casts.md for the rename map.
cast = "anthropic"

# tracing/EnvFilter directive used when RUST_LOG is unset.
log = "kaibo=info"

# Tool gating — true advertises the tool, false drops it (the --no-<tool> flags).
# All four default true; a config that turns all four off is refused at startup.
[server.tools]
consult        = true
oneshot        = true
run_kaish      = true
batch          = true

# ---------------------------------------------------------------------------
# [defaults] — tunables every cast slot falls back to. The model-tracking knobs
# (max_tokens, thinking_budget, temperature, effort, thinking_style) can also be
# overridden per slot (table form, below); request_timeout_secs per backend.
# ---------------------------------------------------------------------------
[defaults]
explorer_max_turns = 100     # bounds each cheap explore′ sweep — cheap, let it rip
synth_max_turns    = 200     # bounds the consult driver loop (sweeps AND span reads)
max_tokens         = 16384   # output headroom; MUST sit well above thinking_budget
thinking_budget    = 8192    # reasoning budget where the provider exposes a toggle

# Sampling, per role: the explorer gathers exact citations (cold); the synth
# composes the answer (a touch warmer). Temperature in [0.0, 2.0], top_p in
# (0.0, 1.0] — out of range is a load error, not a clamp. Anthropic drops
# sampling whenever thinking is on (the API rejects the combination).
explorer_temperature = 0.1
synth_temperature    = 0.3
top_p                = 0.95

# Reasoning depth, per role, for the models that take an effort param (Anthropic
# adaptive tier, DeepSeek). A passthrough string the provider validates — bump
# synth_effort to "max"/"xhigh" for heavier runs without a kaibo release.
explorer_effort = "high"
synth_effort    = "high"

# Force the Anthropic thinking shape ("auto" | "adaptive" | "budget") instead of
# the built-in model classifier — the escape hatch for a new or misclassified id.
thinking_style = "auto"

# Per-request LLM deadline (seconds): the wall-clock ceiling on ONE completion
# call. Seeds every backend; override per backend for a slow local model. Keep it
# above your slowest legitimate single completion — a non-streaming call can't
# tell wedged from slow. 0 is rejected at load.
request_timeout_secs = 900

# Whole-call deadline (seconds): the wall-clock ceiling on ONE interactive call
# (consult / explore / oneshot), across all its completions. This is the backstop
# for when the per-request timeout above doesn't fire — a wedged local server on a
# pooled keep-alive, a stalled response body — so a stalled backend aborts loudly
# instead of hanging your session (a real consult once parked ~17h). Keep it
# comfortably ABOVE the largest request_timeout a call can reach, so it never cuts a
# legitimately slow single completion. Bounds the interactive loop tools — consult /
# explore / oneshot and async consult_submit. `deliberate`'s direct lane (one long
# completion) is bounded instead by its synth backend's request_timeout, so a slow
# local model keeps its full patience without forcing this ceiling high; the batch
# lane holds no in-process wait (provider queue). 0 is rejected at load.
# Env: KAIBO_CALL_DEADLINE_SECS.
call_deadline_secs = 3600

session_capacity = 128       # max multi-turn consult sessions held in memory (LRU,
                             # capacity-evicted, no TTL); must be > 0

# ---------------------------------------------------------------------------
# [sandbox] — the read-only execution limits (see src/sandbox.rs)
# ---------------------------------------------------------------------------
[sandbox]
exec_timeout_secs  = 30      # per-kaish-script wall clock; exit 124 on overrun
output_limit_bytes = 65536   # per-script output cap (64 KiB); exit 3 + head/tail sample
# Cap on the `/` scratch MemoryFs (redirects, mktemp). A write past it fails loudly
# (StorageFull), never silently eating host RAM. Default 64 MiB; must be > 0 — there
# is no "unbounded" setting, an unbounded scratch is the bug this prevents.
scratch_limit_bytes = 67108864
# Builtins to shadow-block ON TOP OF the read-only denylist (exit 126 if invoked).
# This only makes the box STRICTER — it can't re-enable the read-only denylist
# (git/touch/spawn/exec/kill/mktemp), and the dangerous axes aren't compiled in.
# A name that isn't a real builtin is a loud startup error, not a silent no-op.
# disable_builtins = ["grep", "find"]

# ---------------------------------------------------------------------------
# [kaish.ignore] — which gitignore-format files the file-walking builtins
# (glob/grep/ls/find — and the orientation repo-map, which rides the same kernel)
# honor. This is DISCOVERY/NOISE policy, NOT a safety boundary: it changes what the
# explorer SEES, never what it's allowed to read. Omit the whole stanza to keep the
# default below (`.gitignore` + built-in defaults, enforced scope) — that's exactly
# what kaibo does today. Every key is optional; a partial stanza overrides only the
# keys it names. File-only (no KAIBO_* env).
# ---------------------------------------------------------------------------

# [kaish.ignore]
# `files` REPLACES the default [".gitignore"] — to add (say) .claudeignore while
# keeping .gitignore, list both. Loaded at the root and walked up through ancestors,
# in precedence order (later wins, ripgrep-style). auto_gitignore (below) still walks
# root + nested .gitignore files regardless of this list — so dropping ".gitignore"
# here does NOT disable .gitignore (only stops honoring ANCESTOR .gitignores above
# the root). To honor .gitignore nowhere, set auto_gitignore = false AND omit it here.
# files = [".gitignore", ".claudeignore"]
# defaults         = true       # built-in target/, node_modules/, .git
# auto_gitignore   = true       # auto-load nested .gitignore files during the walk
# global_gitignore = false      # also honor the user's global gitignore (excludesFile)
# scope = "enforced"            # "enforced" = every walker incl. find (guards agent
                                # context); "advisory" = polite tools only, find stays
                                # POSIX-unrestricted. A typo here is a load error.

# ---------------------------------------------------------------------------
# [telemetry] — OpenTelemetry trace export. OFF BY DEFAULT, and that default is
# load-bearing: kaibo reads private source, and the spans rig emits carry prompts,
# completions, and source snippets. A default run ships NOTHING. Enabling opens an
# OUTBOUND OTLP/HTTP connection to `endpoint` — allowed under stdio-only (kaibo
# never *binds* a socket), but a real boundary, so it's opt-in. rig already emits
# the GenAI span tree (a tool call → each phase → each model turn, with token
# usage); this just exports it. Transport is OTLP/HTTP + protobuf (the `/v1/traces`
# path), reusing kaibo's reqwest — no gRPC. Env: KAIBO_TELEMETRY_{ENABLED,ENDPOINT,
# TIMEOUT_SECS,SERVICE_NAME}. `headers` is file-only (a value can be a secret).
# ---------------------------------------------------------------------------

# [telemetry]
# enabled      = true                                # default false — opt in here
# endpoint     = "http://localhost:4318/v1/traces"   # OTLP/HTTP traces receiver
# timeout_secs = 10                                  # per-export deadline; must be > 0
# service_name = "kaibo"                             # service.name on the trace Resource
# Extra export headers (auth for a remote collector). The VALUES are secrets — they
# never appear in the kaibo://config render (only the header names do).
# headers = { authorization = "Bearer <token>" }

# ---------------------------------------------------------------------------
# [backends.<name>] — CONNECTIONS only: `kind` picks the wire protocol/rig client
# (anthropic | deepseek | gemini | openai); the rest describes the wire (endpoint,
# key source, per-request deadline). Models live on cast slots, never here.
#
# Keys are referenced, never inlined: api_key_env names an env var, api_key_file a
# path (~ ok). env wins over file. key_optional=true falls back to a placeholder
# bearer token (keyless local servers). base_url is only legal on the openai kind
# (rig fixes the keyed endpoints — a base_url there is a loud load error).
# ---------------------------------------------------------------------------

# --- The five built-ins, shown with their current defaults. You only need to
#     list a backend here to CHANGE something; these blocks are illustrative.
#     Their alias names (claude, google, local, lemonade, gemma, gemma4) are
#     reserved at both levels — naming a new backend or cast after one is a
#     loud collision error. ---

[backends.anthropic]                         # alias: claude
kind = "anthropic"
api_key_env  = "ANTHROPIC_API_KEY"
api_key_file = "~/.anthropic-key.txt"

[backends.deepseek]
kind = "deepseek"
api_key_env  = "DEEPSEEK_API_KEY"
api_key_file = "~/.deepseek-key"

[backends.gemini]                            # alias: google
kind = "gemini"
api_key_env  = "GEMINI_API_KEY"
api_key_file = "~/.gemini-api-key"

# OpenRouter: one key, every major model family, through a single gateway. Fixed
# endpoint — rig owns it, so a base_url here is a loud load error, unlike the openai
# kind below. Reasoning is on by default on every slot (OpenRouter's unified
# `{"reasoning":{"effort":…}}`, translated per upstream model and silently dropped
# where a model has no such knob) — see [casts.or-deep] for pushing a slot past
# [defaults] effort into OpenRouter's deeper `xhigh`/`max` rungs.
#
# One slug routes across COMPETING HOSTS whose data policies differ, and kaibo's
# prompts carry your source — so every request pins no-collection routing
# (`provider.data_collection = "deny"`) BY DEFAULT. A model whose only hosts
# retain/train on prompts (most `:free` variants) then fails loudly instead of
# leaking quietly. `data_collection = "allow"` is the explicit opt-in: kaibo
# emits no restriction and your OpenRouter account settings govern. This knob
# exists only on the openrouter kind — anywhere else it's a load error.
[backends.openrouter]
kind = "openrouter"
api_key_env  = "OPENROUTER_API_KEY"
api_key_file = "~/.openrouter-key"
# kaibo always denies unless you uncomment this line:
# data_collection = "allow"

[backends.openai-local]                            # aliases: local, lemonade, gemma, gemma4
kind = "openai"
base_url = "http://localhost:13305/api/v1"   # also overridable via OPENAI_BASE_URL
api_key_env  = "OPENAI_API_KEY"
api_key_file = "~/.openai-key"
key_optional = true                          # keyless local default → placeholder

# --- New backends: any number of openai-kind endpoints, each its own connection.
#     A new backend must declare its `kind`; it seeds that kind's default key
#     sources, then your fields apply on top. A new openai-kind backend must also
#     set `base_url` (the OPENAI_BASE_URL / local-default fallback belongs to the
#     built-in `openai-local` backend alone — a forgotten base_url is a load error, not
#     a silent dial of the wrong server). ---

# Hosted OpenAI, keyed. Backends take their own `aliases`, just like casts — a new
# alias must not collide with a built-in or another name.
[backends.gpt]
kind = "openai"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
aliases = ["oai"]                            # now `oai/gpt-5` resolves to this backend
key_optional = false

# A second local llama.cpp server on another port, keyless. A slow local model
# legitimately wants a longer per-request leash than a hosted API.
[backends.llama]
kind = "openai"
base_url = "http://localhost:8080/v1"
key_optional = true
request_timeout_secs = 1800

# ---------------------------------------------------------------------------
# [casts.<name>] — COMPOSITIONS: role → model, freely spanning backends. This is
# what the `cast` call param (and `server.cast` / KAIBO_CAST / --cast) selects.
#
# The calling agent sees your cast names — name them for intent (`local-only`,
# `deep-dive`) so it can route by name without reading this file.
#
# Roles: explorer, synth (the agent phases). There are no output/production roles —
# kaibo reasons over code and renders nothing. A typo'd role is a loud load
# error. A cast may omit roles — the tool that needs a missing role fails at call time,
# naming the gap ("cast `notes` has no synth slot"); absent = capability absent.
#
# Slot forms:
#   role = "backend/model-id"                                  # the common case
#   role = { backend = "…", id = "…", vision = true, … }       # pins + tunables
# The first "/" splits a string ref, so HuggingFace-style ids keep their inner
# slash. A slot ref borrows the backend's CONNECTION only — it never follows
# another cast, so chains and cycles are structurally impossible. An unknown
# backend in a slot is a load error naming the known backends.
# ---------------------------------------------------------------------------

# --- Advanced — a chimera: mix model FAMILIES across roles, a different lineage per
#     job, named as one team (`cast = "chimera"`). A cheap DeepSeek explorer + a strong
#     Claude synth give you mistakes that don't line up. It's the power-user option and
#     wants a key per family. The common case is simpler: ONE outside family, explorer
#     and synth both within it (the built-in `deepseek`/`gemini`/`anthropic` casts, or
#     `local-only` below) — that single lineage already augments your own agent's. ---

[casts.chimera]
explorer = "deepseek/deepseek-v4-flash"     # cheap fast sweeps — DeepSeek family
synth    = "claude/claude-sonnet-4-6"       # the voice that answers — Claude family

# --- Privacy posture: nothing leaves the box. `gemma` is the built-in alias for
#     the local-default `openai-local` backend. ---

[casts.local-only]
explorer = "gemma/Gemma-4-E4B-it-GGUF"
synth    = "gemma/Gemma-4-26B-A4B-it-GGUF"

# --- The table form, part 1: capability pins. `vision = true` overrides the
#     built-in classifier (Anthropic/Gemini multimodal-in, DeepSeek text-only,
#     generic openai endpoints vision-off until you say otherwise — kaibo can't
#     know what's behind an arbitrary id, so opt in, don't guess). A vision slot on
#     an openai-compatible backend really sees: `view_image` reads the file and kaibo
#     delivers it on the user-turn channel (the openai wire forbids images in a tool
#     result), so a local Qwen-VL/llava views workspace images the same as a hosted
#     Claude or Gemini does. ---

[casts.vlm]
explorer = "llama/qwen2.5-coder-7b"                              # bare ref: just the id
synth    = { backend = "llama", id = "qwen2.5-vl-32b", vision = true }

# --- The table form, part 2: per-slot tunables. Each overrides its [defaults]
#     per-role value for THIS slot only; knobs you omit fall back. Available:
#     max_tokens, thinking_budget, temperature, effort, thinking_style, and
#     `preamble` (the per-model system prompt) — they track the model, not the
#     server. A typo'd knob is a loud load error. See [prompts] below for how the
#     per-model `preamble` layers over the per-phase prompt and the built-in. ---

[casts.deep-dive]
aliases  = ["deep"]                          # casts (and backends) take aliases
explorer = { backend = "deepseek", id = "deepseek-v4-flash", temperature = 0.0, thinking_budget = 4096, thinking_style = "auto" }
synth    = { backend = "claude", id = "claude-opus-4-8", effort = "max", max_tokens = 32768 }

# --- The built-in `openrouter` backend already has a key source, so a custom cast on
#     it needs only slots. `~author/family-latest` aliases (see the built-in `openrouter`
#     cast) track the newest release instead of rotting; `effort = "xhigh"` here pushes
#     the synth slot past [defaults] synth_effort ("high") into a rung only OpenRouter's
#     unified reasoning param reaches. The same knob is the opt-out: reasoning is on by
#     default for everything kaibo calls, and `effort = "none"` on a slot turns it off
#     when the cost/latency isn't wanted (reasoning bills as output tokens). ---

[casts.or-deep]
explorer = "openrouter/~google/gemini-flash-latest"
synth    = { backend = "openrouter", id = "~anthropic/claude-sonnet-latest", effort = "xhigh" }

# --- A per-model prompt: a local Gemma explorer wants different framing than a
#     hosted Claude would. `preamble` lives on the slot, beside the tunables, and
#     wins over [prompts].explorer and the built-in for THIS model. ---

[casts.tuned-local]
explorer = { backend = "gemma", id = "Gemma-4-E4B-it-GGUF", preamble = "You are a careful reader. Quote exact numbered lines; never guess a path." }
synth    = "claude/claude-sonnet-4-6"        # no per-model prompt → [prompts] or built-in

# --- Hosted GPT end to end, both roles on the keyed backend above. ---

[casts.gpt]
explorer = "gpt/gpt-5-mini"
synth    = "gpt/gpt-5"

# --- A custom batch cast: the offline `batch_submit` lane (max thinking). `lane = "batch"`
#     on the SYNTH SLOT declares it (lane is a per-slot property, not a cast-level one —
#     it needs a synth slot on a batch-capable backend, Anthropic or Gemini). The built-in
#     `batch = true` spelling below is backward-compat sugar for exactly this: it sets the
#     synth slot's lane, nothing more. The built-in anthropic-batch / gemini-batch casts are
#     the same shape and, like this one, run the synth alone (no explorer) — but that's a
#     choice, not a rule: a cast MAY pair an interactive explorer with an offline synth (the
#     `deliberate` shape), since the lane lives on the slot, not the whole cast. Gemini Pro
#     especially earns this lane: interactively it's refusal-prone on security framing and
#     503s under load, but batch sidesteps both — so reach for Pro batch-only (the built-in
#     `gemini-batch` cast, or a custom one like this). ---

[casts.pro-batch]
batch    = true
synth    = "gemini/gemini-pro-latest"        # batch-capable synth (Anthropic | Gemini); Pro is batch-only
# Equivalent, spelled directly on the slot (no cast-level sugar):
#   synth = { backend = "gemini", id = "gemini-pro-latest", lane = "batch" }

# --- DELIBERATE casts: an interactive explorer PLUS an offline synth. `deliberate` runs
#     the explorer live to build a cited dossier, then hands dossier+question to the offline
#     synth to reason over — a frontier model's deepest pass without holding a session open.
#     The synth's lane picks the offline mechanism: `batch` (a provider batch, half price,
#     durable handle) below, or `direct` (one long LOCAL completion) further down. Unlike the
#     synth-only batch casts above, these carry BOTH slots — the explorer is what makes it a
#     deliberate cast rather than a plain batch one. ---

# Fable on the batch lane, with a Sonnet explorer building the dossier.
[casts.fable]
explorer = "anthropic/claude-sonnet-4-6"
synth    = { backend = "anthropic", id = "claude-fable-5", lane = "batch" }

# Gemini Pro deliberating on the batch lane, with a cheap Flash-Lite explorer.
[casts.gemini-deliberate]
explorer = "gemini/gemini-flash-lite-latest"
synth    = { backend = "gemini", id = "gemini-pro-latest", lane = "batch" }

# --- The other offline lane, `lane = "direct"`: one long completion kaibo runs itself
#     against a big LOCAL model (no async provider API, no `batch = true` sugar for this
#     one — spell it on the slot). For offline deliberation over a big model that's too slow
#     to run inside a live tool loop and has no batch endpoint. `deliberate` consumes it: it
#     builds the dossier with the interactive explorer, then runs the direct synth as one
#     long local completion under a session-scoped `job-N` handle. ---

[casts.local-direct]
explorer = "gemma/Gemma-4-E4B-it-GGUF"       # an interactive explorer beside an offline synth
synth    = { backend = "gemma", id = "Big-Local-70B-GGUF", lane = "direct" }

# ---------------------------------------------------------------------------
# [context] — "house rules" files spliced into every consultation tool's preamble
# as standing guidance, so kaibo's models inherit the calling agent's conventions.
# Vendor-neutral: the only default is the emerging AGENTS.md convention.
# ---------------------------------------------------------------------------
# Two lists, two failure modes:
#   project_files — root-relative, read IF PRESENT (absent is normal); each must
#     stay within the project root (a ../ escape or out-of-tree symlink is refused).
#     Default ["AGENTS.md"]; an explicit [] opts out. Env KAIBO_PROJECT_FILES
#     (colon-separated) / CLI --project-context-file (repeatable).
#   user_files — absolute/tilde, read REQUIRED (a missing declared file is a loud
#     error). Read in trusted server-side Rust; only the CONTENTS reach the model,
#     never the path, so the read-only shell's scope is not widened. Env
#     KAIBO_USER_FILES / CLI --user-context-file.
#
# [context]
# project_files = ["AGENTS.md"]
# user_files    = ["~/.claude/CLAUDE.md"]

# ---------------------------------------------------------------------------
# [prompts] — per-PHASE system-prompt overrides. Where [context] ADDS project
# guidance, [prompts] REPLACES the built-in role framing (full replace — the kaish
# shell contract rides the run_kaish tool regardless). File-only and operator-only
# (a calling agent can't inject a prompt). An empty value is a loud load error.
# Precedence per phase: slot `preamble` (per-model, above) > [prompts].<phase> >
# built-in. The synth slot feeds both `consult` and `oneshot`, but each keeps
# its own key, so they can diverge. Phases: `explorer` (the nested explore′ sweep),
# `consult` (the driver), `oneshot` (the thin toolless answer), `batch` (the offline
# max-thinking answer).
# ---------------------------------------------------------------------------
#
# [prompts]
# explorer = "You are a security auditor. Hunt injection sinks and unsafe deserialization."
# oneshot  = "Answer concisely; you have no codebase access, so reason from what you're given."
# batch    = "Answer concisely; you're offline at max thinking. Reason from what you're given."
# consult  = """
# You are a staff engineer reviewing this codebase.
# Prefer architectural answers; name the file:line that carries each claim.
# """
